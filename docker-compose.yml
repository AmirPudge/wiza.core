services:
  postgres:
    image: postgres:16-alpine
    container_name: wiza_postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-wiza_core}
      POSTGRES_USER:     ${POSTGRES_USER:-wiza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wiza} -d ${POSTGRES_DB:-wiza_core}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
